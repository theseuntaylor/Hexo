name: Deploy to Play Store

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/hexo.jks

      - name: Create key.properties
        run: |
          cat > key.properties <<EOF
          storeFile=$HOME/hexo.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Auto-increment versionCode and set versionName from tag
        run: |
          # Extract current versionCode from build.gradle
          CURRENT_VERSION_CODE=$(grep -oP 'versionCode \K\d+' app/build.gradle)
          NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))

          # Extract version name from the git tag (v1.2.0 → 1.2.0)
          TAG_NAME=${GITHUB_REF_NAME}
          VERSION_NAME=${TAG_NAME#v}

          echo "Bumping versionCode: $CURRENT_VERSION_CODE → $NEW_VERSION_CODE"
          echo "Setting versionName: $VERSION_NAME (from tag $TAG_NAME)"

          # Update versionCode
          sed -i "s/versionCode $CURRENT_VERSION_CODE/versionCode $NEW_VERSION_CODE/" app/build.gradle

          # Replace the dynamic versionName expression with the tag-derived version
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "NEW_VERSION_CODE=$NEW_VERSION_CODE" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build signed release AAB
        run: ./gradlew bundleRelease

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.theseuntaylor.hexo
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - name: Commit versionCode bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "chore: bump versionCode to ${{ env.NEW_VERSION_CODE }} after ${{ github.ref_name }} release"
          git push origin master
